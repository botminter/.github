<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 720 520" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <!-- Shadow filter -->
