    </filter>
    <!-- Clip for rounded corners on entire card -->
    <clipPath id="cardClip">
      <rect x="20" y="10" width="680" height="500" rx="12"/>
    </clipPath>
    <!-- BotMinter logo avatar -->
    <symbol id="bm-logo" viewBox="0 0 1774.9 1404.5">
      <defs>
        <clipPath clipPathUnits="userSpaceOnUse" id="c1"><rect x="3800.8" y="-663.33" width="1615.1" height="1615.1" ry="7.58" fill="#020202"/></clipPath>
        <clipPath clipPathUnits="userSpaceOnUse" id="c3"><rect x="3800.8" y="-663.33" width="1615.1" height="1615.1" ry="7.58" fill="#020202"/></clipPath>
        <clipPath clipPathUnits="userSpaceOnUse" id="c4"><rect x="499.07" y="104.72" width="63.74" height="63.74" ry=".3" fill="#020202"/></clipPath>
        <clipPath clipPathUnits="userSpaceOnUse" id="c5"><rect x="3800.8" y="-663.33" width="1615.1" height="1615.1" ry="7.58" fill="#020202"/></clipPath>
      </defs>
