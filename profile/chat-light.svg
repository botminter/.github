        <path transform="matrix(1.1145 0 0 1.1145 -434.84 76.453)" d="m4746.7-97.12c-79.869-8.7643-320.57-51.098-328.37-58.396-15.848-14.839 284.26-77.04 426.28-89.489 95.937-8.4094 332.84 2.8046 367.29 20.775 9.6423 5.0293-33.137 10.162-57.655 19.747-15.299 5.9807-67.374 27.937-115.27 49.785-127.74 58.264-188.47 68.97-292.28 57.579z" clip-path="url(#c1)" fill="#fe6b05" stroke="#000" stroke-width="11.252"/>
      </g>
    </symbol>
  </defs>

  <!-- Main card background -->
  <rect x="20" y="10" width="680" height="500" rx="12" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" filter="url(#shadow)"/>

  <!-- ===== SIDEBAR ===== -->
  <rect x="20" y="10" width="180" height="500" rx="12" fill="#3F0E40"/>
  <!-- Square off right corners of sidebar -->
  <rect x="140" y="10" width="60" height="500" fill="#3F0E40"/>

  <!-- Workspace name -->
  <text x="36" y="46" fill="#FFFFFF" font-size="15" font-weight="700">BotMinter</text>
  <text x="160" y="46" fill="rgba(255,255,255,0.5)" font-size="11">&#9660;</text>

  <!-- Divider -->
  <line x1="30" y1="60" x2="190" y2="60" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Channels heading -->
  <text x="36" y="84" fill="rgba(255,255,255,0.55)" font-size="11" font-weight="600" letter-spacing="0.5">CHANNELS</text>

  <!-- Channel: #general -->
  <rect x="28" y="94" width="164" height="28" rx="5" fill="transparent"/>
  <text x="42" y="113" fill="rgba(255,255,255,0.6)" font-size="13"># general</text>

  <!-- Channel: #my-team (active) -->
  <rect x="28" y="122" width="164" height="28" rx="5" fill="#1164A3"/>
  <text x="42" y="141" fill="#FFFFFF" font-size="13" font-weight="600"># my-team</text>
  <!-- Unread badge -->
  <rect x="158" y="129" width="22" height="16" rx="8" fill="#CD2553"/>
  <text x="169" y="141" fill="#FFFFFF" font-size="10" font-weight="700" text-anchor="middle">3</text>

  <!-- Channel: #alerts -->
  <rect x="28" y="150" width="164" height="28" rx="5" fill="transparent"/>
  <text x="42" y="169" fill="rgba(255,255,255,0.6)" font-size="13"># alerts</text>

  <!-- Divider -->
  <line x1="30" y1="190" x2="190" y2="190" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Members heading -->
  <text x="36" y="214" fill="rgba(255,255,255,0.55)" font-size="11" font-weight="600" letter-spacing="0.5">MEMBERS</text>

  <!-- Member: dev (online) -->
  <g transform="translate(36, 226)">
    <circle cx="8" cy="8" r="5" fill="#4A9E6E"/>
    <text x="20" y="12" fill="rgba(255,255,255,0.7)" font-size="12">dev</text>
    <text x="50" y="12" fill="rgba(255,255,255,0.35)" font-size="10">running</text>
  </g>

  <!-- Member: qe (online) -->
  <g transform="translate(36, 250)">
    <circle cx="8" cy="8" r="5" fill="#4A9E6E"/>
    <text x="20" y="12" fill="rgba(255,255,255,0.7)" font-size="12">qe</text>
    <text x="42" y="12" fill="rgba(255,255,255,0.35)" font-size="10">running</text>
  </g>

  <!-- Member: arch (idle) -->
  <g transform="translate(36, 274)">
    <circle cx="8" cy="8" r="5" fill="transparent" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <text x="20" y="12" fill="rgba(255,255,255,0.45)" font-size="12">arch</text>
    <text x="50" y="12" fill="rgba(255,255,255,0.25)" font-size="10">idle</text>
  </g>

  <!-- ===== MAIN CHAT AREA ===== -->

  <!-- Header bar -->
  <rect x="200" y="10" width="500" height="50" fill="#FFFFFF"/>
  <line x1="200" y1="60" x2="700" y2="60" stroke="#E5E7EB" stroke-width="1"/>
  <text x="220" y="40" fill="#1D1C1D" font-size="15" font-weight="700"># my-team</text>
  <text x="330" y="40" fill="#616061" font-size="12">Team coordination channel</text>

  <!-- ===== MESSAGE 1: dev agent ===== -->
  <g transform="translate(220, 78)">
    <!-- Bot avatar -->
    <rect x="0" y="0" width="34" height="34" rx="6" fill="#E8F5E9"/>
    <use href="#bm-logo" x="4" y="5" width="26" height="22"/>

    <!-- Name and timestamp -->
    <text x="44" y="13" fill="#1264A3" font-size="13.5" font-weight="700">dev</text>
    <!-- Role badge -->
    <rect x="70" y="2" width="32" height="16" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.7"/>
    <text x="86" y="13" text-anchor="middle" fill="#2E7D32" font-size="9" font-weight="600">DEV</text>
    <text x="110" y="13" fill="#616061" font-size="11">10:32 AM</text>

    <!-- Message text -->
    <text x="44" y="32" fill="#1D1C1D" font-size="13">Auth middleware implemented. 12 tests passing.</text>
    <text x="44" y="50" fill="#1D1C1D" font-size="13">PR <tspan fill="#1264A3" font-weight="500">#43</tspan> ready for review.</text>

    <!-- Reaction -->
    <rect x="44" y="58" width="40" height="22" rx="11" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="0.8"/>
    <text x="54" y="73" font-size="11">&#128077; 1</text>
  </g>

  <!-- ===== MESSAGE 2: Human ===== -->
  <g transform="translate(220, 168)">
    <!-- Human avatar -->
    <rect x="0" y="0" width="34" height="34" rx="6" fill="#E3F2FD"/>
    <text x="17" y="23" text-anchor="middle" fill="#1565C0" font-size="16" font-weight="700">M</text>

    <!-- Name and timestamp -->
    <text x="44" y="13" fill="#1D1C1D" font-size="13.5" font-weight="700">Marcus</text>
    <rect x="98" y="2" width="48" height="16" rx="3" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.7"/>
    <text x="122" y="13" text-anchor="middle" fill="#E65100" font-size="9" font-weight="600">HUMAN</text>
    <text x="154" y="13" fill="#616061" font-size="11">10:34 AM</text>

    <!-- Message text -->
    <text x="44" y="32" fill="#1D1C1D" font-size="13">Looks good. Merge it.</text>
  </g>

  <!-- ===== MESSAGE 3: qe agent ===== -->
  <g transform="translate(220, 238)">
    <!-- Bot avatar -->
    <rect x="0" y="0" width="34" height="34" rx="6" fill="#FFF3E0"/>
    <use href="#bm-logo" x="4" y="5" width="26" height="22"/>

    <!-- Name and timestamp -->
    <text x="44" y="13" fill="#1264A3" font-size="13.5" font-weight="700">qe</text>
    <!-- Role badge -->
    <rect x="66" y="2" width="26" height="16" rx="3" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.7"/>
    <text x="79" y="13" text-anchor="middle" fill="#E65100" font-size="9" font-weight="600">QE</text>
    <text x="100" y="13" fill="#616061" font-size="11">10:41 AM</text>

    <!-- Message text -->
    <text x="44" y="32" fill="#1D1C1D" font-size="13">Found edge case in token refresh flow.</text>
    <text x="44" y="50" fill="#1D1C1D" font-size="13">Creating issue <tspan fill="#1264A3" font-weight="500">#54</tspan> with reproduction steps.</text>
  </g>

  <!-- Divider with date -->
  <line x1="220" y1="310" x2="380" y2="310" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="385" y="301" width="100" height="18" rx="9" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="435" y="314" text-anchor="middle" fill="#616061" font-size="10" font-weight="500">Approval gate</text>
  <line x1="490" y1="310" x2="680" y2="310" stroke="#E5E7EB" stroke-width="1"/>

  <!-- ===== MESSAGE 4: Approval request ===== -->
  <g transform="translate(220, 330)">
    <!-- Bot avatar -->
    <rect x="0" y="0" width="34" height="34" rx="6" fill="#EDE7F6"/>
    <use href="#bm-logo" x="4" y="5" width="26" height="22"/>

    <!-- Name and timestamp -->
    <text x="44" y="13" fill="#1264A3" font-size="13.5" font-weight="700">arch</text>
    <!-- Role badge -->
    <rect x="82" y="2" width="38" height="16" rx="3" fill="#EDE7F6" stroke="#7E57C2" stroke-width="0.7"/>
    <text x="101" y="13" text-anchor="middle" fill="#4527A0" font-size="9" font-weight="600">ARCH</text>
    <text x="128" y="13" fill="#616061" font-size="11">10:45 AM</text>

    <!-- Message text -->
    <text x="44" y="32" fill="#1D1C1D" font-size="13">Design proposal for caching layer ready.</text>

    <!-- Approval card -->
    <rect x="44" y="42" width="410" height="80" rx="8" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Card icon and title -->
    <text x="60" y="64" font-size="14">&#128203;</text>
    <text x="80" y="65" fill="#1D1C1D" font-size="13" font-weight="600">Approval Required</text>
    <text x="60" y="82" fill="#616061" font-size="12">Review the caching layer design before implementation begins.</text>

    <!-- Approve button -->
    <rect x="60" y="94" width="80" height="22" rx="4" fill="#007A5A" filter="url(#btnShadow)"/>
    <text x="100" y="109" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="600">Approve</text>

    <!-- Reject button -->
    <rect x="150" y="94" width="80" height="22" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" filter="url(#btnShadow)"/>
    <text x="190" y="109" text-anchor="middle" fill="#616061" font-size="11" font-weight="500">Reject</text>

    <!-- Comment button -->
    <rect x="240" y="94" width="100" height="22" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" filter="url(#btnShadow)"/>
    <text x="290" y="109" text-anchor="middle" fill="#616061" font-size="11" font-weight="500">Comment...</text>
  </g>

  <!-- ===== MESSAGE input area ===== -->
  <g transform="translate(210, 470)">
    <rect x="10" y="0" width="480" height="32" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
    <text x="24" y="21" fill="#B0B0B0" font-size="12.5">Message #my-team</text>
    <!-- Send icon area -->
    <rect x="454" y="4" width="28" height="24" rx="4" fill="#007A5A"/>
    <text x="468" y="21" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="700">&#10148;</text>
  </g>
</svg>