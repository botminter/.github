<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 780 300" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .bg { fill: none; rx: 8; }
      .stage { fill: #ffffff; rx: 12; stroke: #d1d9e0; stroke-width: 1; }
      .stage-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #1f2328; }
      .stage-desc { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; fill: #656d76; }
      .avatar-circle { stroke: #d1d9e0; stroke-width: 1; }
      .avatar-emoji { font-size: 28px; }
      .arrow { fill: none; stroke: #b0b8c1; stroke-width: 2; }
      .arrowhead { fill: #b0b8c1; }
      .role-manager { fill: #fff1e5; }
      .role-manager-text { fill: #bc4c00; }
      .role-dev { fill: #dafbe1; }
      .role-dev-text { fill: #1a7f37; }
      .role-qe { fill: #fbefff; }
      .role-qe-text { fill: #8250df; }
      .role-sre { fill: #ddf4ff; }
      .role-sre-text { fill: #0969da; }
      .badge { rx: 10; }
      .badge-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 600; }
      .status-label { rx: 10; }
      .status-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 11px; font-weight: 500; }
      .status-triage { fill: #ddf4ff; }
      .status-triage-text { fill: #0969da; }
      .status-coding { fill: #fff8c5; }
      .status-coding-text { fill: #9a6700; }
      .status-testing { fill: #fbefff; }
      .status-testing-text { fill: #8250df; }
      .status-done { fill: #dafbe1; }
      .status-done-text { fill: #1a7f37; }
    </style>
    <!-- BotMinter logo avatar -->
    <symbol id="bm-logo" viewBox="0 0 1774.9 1404.5">
      <defs>
