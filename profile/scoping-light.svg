      <path d="M0 4.5 C0 3.2 0.8 2.8 1.4 2.8 L13 2.8 C14 2.8 14.5 3.2 14.5 4.5 L14.5 10 C14.5 11 14 11.5 13 11.5 L1.4 11.5 C0.8 11.5 0 11 0 10 Z" fill="#f0c878"/>
    </g>
    <g id="file-icon">
