      .isolated-chip { fill: #fff5f5; rx: 8; stroke: #cf222e; stroke-width: 0.5; }
      .isolated-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 9px; font-weight: 500; fill: #cf222e; }
      .separator { stroke: #e8eaed; stroke-width: 1; }
